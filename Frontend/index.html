<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuthApp — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main class="container">
    <div class="brand">
      <div class="logo-mark">A</div>
      <span class="brand-name">DekNek App</span>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="form active" onsubmit="handleLogin(event)">
        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Enter your credentials to continue</p>
        </div>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="abc@gmail.com" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="••••••••" required />
            <button type="button" class="eye-btn" onclick="togglePass('login-password', this)">👁</button>
          </div>
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" class="form" onsubmit="handleSignup(event)">
        <div class="form-header">
          <h1>Create account</h1>
        </div>
        <div class="field">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="Sayali Bhakare" required />
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6"/>
            <button type="button" class="eye-btn" onclick="togglePass('signup-password', this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
        <div id="signup-error" class="error-msg hidden"></div>
        <div id="signup-success" class="success-msg hidden"></div>
        <button type="submit" class="btn-primary" id="signup-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
      </form>
    </div>
  </main>

  <!-- DASHBOARD (shown after login) -->
  <div id="dashboard" class="dashboard hidden">
    <div class="dash-bg-grid"></div>
    <nav class="dash-nav">
      <div class="brand">
        <div class="logo-mark">D</div>
        <span class="brand-name">DekNek App</span>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </nav>
    <div class="dash-content">
      <div class="welcome-card">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <h2 id="user-greeting">Hello, User!</h2>
          <p id="user-email-display"></p>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-icon">🔐</span>
          <span class="stat-label">Status</span>
          <span class="stat-value">Authenticated</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">📅</span>
          <span class="stat-label">Logged in</span>
          <span class="stat-value" id="login-time"></span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🛡️</span>
          <span class="stat-label">Session</span>
          <span class="stat-value">Active</span>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
